<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>جنگ جهانی</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div id="loading" class="screen active">
      <div class="loader"></div>
      <p>در حال بارگذاری...</p>
    </div>

    <!-- Welcome / Register -->
    <div id="welcome" class="screen">
      <div class="welcome-box">
        <h1>🌍 جنگ جهانی</h1>
        <p>بازی استراتژیک آنلاین</p>
        <div id="lang-select">
          <button class="btn btn-primary" onclick="selectLang('fa')">🇮🇷 فارسی</button>
          <button class="btn btn-secondary" onclick="selectLang('en')">🇺🇸 English</button>
        </div>
        <div id="country-select" style="display:none">
          <h2>کشور خود را انتخاب کنید:</h2>
          <div id="country-grid"></div>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="screen">
      <header class="header">
        <div class="user-info">
          <span id="user-flag"></span>
          <span id="user-name"></span>
          <span class="level-badge">Lv.<span id="user-level">1</span></span>
        </div>
      </header>

      <div class="stats-bar">
        <div class="stat"><span class="stat-icon">💰</span><span id="stat-gold">0</span></div>
        <div class="stat"><span class="stat-icon">🛢</span><span id="stat-oil">0</span></div>
        <div class="stat"><span class="stat-icon">⚙️</span><span id="stat-steel">0</span></div>
        <div class="stat"><span class="stat-icon">⚔️</span><span id="stat-power">0</span></div>
      </div>

      <nav class="main-nav">
        <button class="nav-btn" onclick="showSection('army')">⚔️ ارتش</button>
        <button class="nav-btn" onclick="showSection('shop')">🏪 فروشگاه</button>
        <button class="nav-btn" onclick="showSection('wars')">🔥 جنگ‌ها</button>
        <button class="nav-btn" onclick="showSection('profile')">👤 پروفایل</button>
      </nav>

      <!-- Army Section -->
      <div id="section-army" class="section active">
        <h2>تجهیزات نظامی</h2>
        <div id="equipment-list" class="card-list"></div>
      </div>

      <!-- Shop Section -->
      <div id="section-shop" class="section">
        <h2>فروشگاه</h2>
        <div id="shop-list" class="card-list"></div>
      </div>

      <!-- Wars Section -->
      <div id="section-wars" class="section">
        <h2>جنگ‌ها</h2>
        <button class="btn btn-danger btn-full" onclick="showDeclareWar()">⚔️ اعلان جنگ جدید</button>
        <div id="wars-list" class="card-list"></div>
      </div>

      <!-- Profile Section -->
      <div id="section-profile" class="section">
        <h2>پروفایل</h2>
        <div class="profile-card">
          <div id="profile-flag" class="big-flag"></div>
          <h3 id="profile-country"></h3>
          <div class="profile-stats">
            <div>💰 <span id="profile-gold">0</span></div>
            <div>⚔️ قدرت: <span id="profile-power">0</span></div>
            <div>📈 درآمد: <span id="profile-income">0</span>/روز</div>
          </div>
        </div>
      </div>
    </div>

    <!-- War Screen -->
    <div id="war-screen" class="screen">
      <header class="header">
        <button class="btn-back" onclick="goBack()">→</button>
        <h2 id="war-title">جنگ</h2>
      </header>

      <div id="war-content">
        <div id="war-declare-form" style="display:none">
          <h3>انتخاب هدف</h3>
          <div id="target-list" class="card-list"></div>
          <div id="scenario-input" style="display:none">
            <div id="target-info"></div>
            <textarea id="attack-scenario" placeholder="سناریوی حمله خود را بنویسید...&#10;1) دلیل حمله&#10;2) سناریو و استراتژی" rows="6"></textarea>
            <button class="btn btn-danger btn-full" onclick="declareWar()">اعلان جنگ!</button>
          </div>
        </div>

        <div id="war-battle" style="display:none">
          <div id="battle-parties"></div>
          <div id="battle-scenario">
            <textarea id="defense-scenario" placeholder="سناریوی دفاع خود را بنویسید..." rows="6"></textarea>
            <button class="btn btn-primary btn-full" onclick="acceptWar()">شروع نبرد!</button>
          </div>
        </div>

        <div id="war-result" style="display:none">
          <div id="result-narrative" class="narrative-box"></div>
          <div id="result-casualties"></div>
          <div id="result-choices">
            <button class="btn btn-primary" onclick="warAction('continue')">⚔️ ادامه</button>
            <button class="btn btn-secondary" onclick="warAction('peace')">☮️ صلح</button>
            <button class="btn btn-warning" onclick="warAction('surrender')">🏳️ تسلیم</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
