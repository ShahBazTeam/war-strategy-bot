<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>جنگ جهانی</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div id="loading" class="screen active">
      <div class="loader-container">
        <div class="loader"></div>
        <div class="loader-ring"></div>
      </div>
      <h1 class="loading-title">🌍 جنگ جهانی</h1>
      <p class="loading-sub">در حال بارگذاری...</p>
    </div>

    <!-- Welcome / Register -->
    <div id="welcome" class="screen">
      <div class="welcome-bg">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="welcome-box">
        <div class="logo-container">
          <div class="logo-glow"></div>
          <h1 class="logo-text">🌍 جنگ جهانی</h1>
        </div>
        <p class="subtitle">بازی استراتژیک آنلاین</p>
        
        <div id="country-select">
          <h2 class="select-title">کشور خود را انتخاب کنید:</h2>
          <div id="country-grid"></div>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="screen">
      <header class="header">
        <div class="user-info">
          <span id="user-flag" class="user-flag"></span>
          <div class="user-details">
            <span id="user-name" class="user-name"></span>
            <span class="level-badge">Lv.<span id="user-level">1</span></span>
          </div>
        </div>
      </header>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-icon">💰</span>
          <div class="stat-info">
            <span class="stat-value" id="stat-gold">0</span>
            <span class="stat-label">طلا</span>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">🛢</span>
          <div class="stat-info">
            <span class="stat-value" id="stat-oil">0</span>
            <span class="stat-label">نفت</span>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">⚙️</span>
          <div class="stat-info">
            <span class="stat-value" id="stat-steel">0</span>
            <span class="stat-label">فولاد</span>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">⚔️</span>
          <div class="stat-info">
            <span class="stat-value" id="stat-power">0</span>
            <span class="stat-label">قدرت</span>
          </div>
        </div>
      </div>

      <nav class="main-nav">
        <button class="nav-btn active" data-section="army" onclick="showSection('army', this)">
          <span class="nav-icon">⚔️</span>
          <span>ارتش</span>
        </button>
        <button class="nav-btn" data-section="shop" onclick="showSection('shop', this)">
          <span class="nav-icon">🏪</span>
          <span>فروشگاه</span>
        </button>
        <button class="nav-btn" data-section="wars" onclick="showSection('wars', this)">
          <span class="nav-icon">🔥</span>
          <span>جنگ‌ها</span>
        </button>
        <button class="nav-btn" data-section="profile" onclick="showSection('profile', this)">
          <span class="nav-icon">👤</span>
          <span>پروفایل</span>
        </button>
      </nav>

      <div class="section-content">
        <!-- Army Section -->
        <div id="section-army" class="section active">
          <h2 class="section-title">تجهیزات نظامی</h2>
          <div id="equipment-list" class="card-list"></div>
        </div>

        <!-- Shop Section -->
        <div id="section-shop" class="section">
          <h2 class="section-title">فروشگاه</h2>
          <div id="shop-list" class="card-list"></div>
        </div>

        <!-- Wars Section -->
        <div id="section-wars" class="section">
          <h2 class="section-title">جنگ‌ها</h2>
          <button class="btn btn-danger btn-full btn-glow" onclick="showDeclareWar()">⚔️ اعلان جنگ جدید</button>
          <div id="wars-list" class="card-list"></div>
        </div>

        <!-- Profile Section -->
        <div id="section-profile" class="section">
          <h2 class="section-title">پروفایل</h2>
          <div class="profile-card">
            <div class="profile-flag-container">
              <div class="profile-flag-glow"></div>
              <div id="profile-flag" class="big-flag"></div>
            </div>
            <h3 id="profile-country" class="profile-country"></h3>
            <div class="profile-stats">
              <div class="profile-stat">
                <span class="profile-stat-icon">💰</span>
                <span id="profile-gold">0</span>
              </div>
              <div class="profile-stat">
                <span class="profile-stat-icon">⚔️</span>
                <span id="profile-power">0</span>
              </div>
              <div class="profile-stat">
                <span class="profile-stat-icon">📈</span>
                <span id="profile-income">0</span>/روز
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- War Screen -->
    <div id="war-screen" class="screen">
      <header class="header">
        <button class="btn-back" onclick="goBack()">→</button>
        <h2 id="war-title">جنگ</h2>
      </header>

      <div id="war-content">
        <div id="war-declare-form" style="display:none">
          <h3 class="section-title">انتخاب هدف</h3>
          <div id="target-list" class="card-list"></div>
          <div id="scenario-input" style="display:none">
            <div id="target-info"></div>
            <textarea id="attack-scenario" placeholder="سناریوی حمله خود را بنویسید...&#10;1) دلیل حمله&#10;2) سناریو و استراتژی" rows="6"></textarea>
            <button class="btn btn-danger btn-full btn-glow" onclick="declareWar()">اعلان جنگ!</button>
          </div>
        </div>

        <div id="war-battle" style="display:none">
          <div id="battle-parties"></div>
          <div id="battle-scenario">
            <textarea id="defense-scenario" placeholder="سناریوی دفاع خود را بنویسید..." rows="6"></textarea>
            <button class="btn btn-primary btn-full btn-glow" onclick="acceptWar()">شروع نبرد!</button>
          </div>
        </div>

        <div id="war-result" style="display:none">
          <div id="result-narrative" class="narrative-box"></div>
          <div id="result-casualties"></div>
          <div id="result-choices">
            <button class="btn btn-primary" onclick="warAction('continue')">⚔️ ادامه</button>
            <button class="btn btn-secondary" onclick="warAction('peace')">☮️ صلح</button>
            <button class="btn btn-warning" onclick="warAction('surrender')">🏳️ تسلیم</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
